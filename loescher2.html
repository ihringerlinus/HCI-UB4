<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feuerlöscher 2 zuordnen – Feuerwehr Quiz</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body data-correct-epoch="1980"
      data-fact="Der Nu-Swift Feuerlöscher kam ab den 1970er-Jahren zum Einsatz und gehörte in den 1980ern zur Standardausrüstung. Er enthielt Schaummittel und konnte durch einen Schlagknopf aktiviert werden."
      data-name="Feuerlöscher 2"
      data-icon="🧯"
      data-glb="models/loescher2.glb">
    <div class="phone">
        <div class="container">
            <h1 class="page-title">Zuordnen</h1>
            <p class="page-sub">Ziehe das Objekt zur richtigen Person</p>

            <div class="object-badge">
                <model-viewer
                    src="models/loescher2.glb"
                    alt=""
                    camera-controls
                    auto-rotate
                    rotation-per-second="40deg"
                    interaction-prompt="none"
                    disable-zoom>
                </model-viewer>
                Feuerlöscher 2
            </div>

            <div class="detail-card">
                <h2>AR-Feuerlöscher</h2>

                <div class="viewer-wrap">
                    <model-viewer
                        src="models/loescher2.glb"
                        alt="3D-Modell von Feuerlöscher 2"
                        ar
                        ar-modes="scene-viewer webxr"
                        ar-scale="auto"
                        camera-controls
                        auto-rotate
                        shadow-intensity="1"
                        style="transform: translateX(-60px);">
                        <button slot="ar-button" class="btn-ar">
                            📱 In AR ansehen
                        </button>
                    </model-viewer>
                </div>

                <p class="detail-instruction">
                    Wähle den Feuerwehrmann aus der Zeit, in der du denkst,<br>
                    dass dieser Feuerlöscher benutzt wurde.
                </p>

                <div class="epochs">
                    <button class="epoch-btn" data-epoch="1940">
                        <span class="epoch-icon">👨‍🚒</span>
                        <span class="epoch-year">1940</span>
                    </button>
                    <button class="epoch-btn" data-epoch="1980">
                        <span class="epoch-icon">👨‍🚒</span>
                        <span class="epoch-year">1980</span>
                    </button>
                    <button class="epoch-btn" data-epoch="2020">
                        <span class="epoch-icon">👨‍🚒</span>
                        <span class="epoch-year">2020</span>
                    </button>
                </div>
            </div>
        </div>

        <a href="objekte.html" class="fab-back" aria-label="Zurück">←</a>
        <a href="index.html" class="fab-home" aria-label="Home">⌂</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
